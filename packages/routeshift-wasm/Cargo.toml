[package]
name = "routeshift-wasm"
version = "0.1.0"
edition = "2021"
description = "WebAssembly bindings for RouteShift core algorithms"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
routeshift-core = { path = "../routeshift-core" }
routeshift-sim = { path = "../routeshift-sim" }
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
js-sys = "0.3"
web-sys = { version = "0.3", features = ["console"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true
